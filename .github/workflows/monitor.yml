name: Monitor Website

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Prepare data folder
        run: mkdir -p data

      - name: Download page
        run: curl -s "${{ secrets.TARGET_URL }}" -o data/current.html

      - name: Ensure baseline exists
        run: |
          if [ ! -f data/previous.html ]; then
            cp data/current.html data/previous.html
          fi

      - name: Compare pages
        id: compare
        run: |
          if ! diff -q data/previous.html data/current.html > /dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram alert
        if: ${{ steps.compare.outputs.changed == 'true' }}
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="⚡ Website Updated: ${{ secrets.TARGET_URL }}"

      - name: Update baseline
        run: cp data/current.html data/previous.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Update baseline" || echo "No changes"
          git push
